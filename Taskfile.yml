version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  install:
    desc: Install dependencies
    cmds:
      - pnpm install

  dev:
    desc: Start Rollup watch mode
    cmds:
      - pnpm dev

  build:
    desc: Build the bundle
    cmds:
      - pnpm build

  typecheck:
    desc: Run TypeScript type checking
    cmds:
      - pnpm typecheck

  clean:
    desc: Remove build artifacts and node_modules
    cmds:
      - rm -rf node_modules dist/*.js

  ci:
    desc: Run CI checks (install, build, typecheck)
    cmds:
      - pnpm install --frozen-lockfile
      - pnpm build
      - pnpm typecheck
