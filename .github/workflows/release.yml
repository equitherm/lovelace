name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Set Git Bot Identity
        id: git-bot
        run: |
          APP_SLUG="${{ steps.app-token.outputs.app-slug }}"
          USER_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          BOT_NAME="${APP_SLUG}[bot]"
          BOT_EMAIL="${USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
          echo "name=${BOT_NAME}" >> "$GITHUB_OUTPUT"
          echo "email=${BOT_EMAIL}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Semantic Release
        run: >-
          npx --package semantic-release@25
          --package @semantic-release/changelog
          --package @semantic-release/npm
          --package @semantic-release/git
          --package @semantic-release/github
          --package conventional-changelog-conventionalcommits
          semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GIT_AUTHOR_NAME: ${{ steps.git-bot.outputs.name }}
          GIT_AUTHOR_EMAIL: ${{ steps.git-bot.outputs.email }}
          GIT_COMMITTER_NAME: ${{ steps.git-bot.outputs.name }}
          GIT_COMMITTER_EMAIL: ${{ steps.git-bot.outputs.email }}
