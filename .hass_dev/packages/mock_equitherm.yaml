# ─── Adjustable inputs (act as number/climate entities) ──────────────────────

input_number:
  mock_target_temp:
    name: "Target Temperature"
    min: 16
    max: 26
    step: 0.5
    initial: 21
    unit_of_measurement: "°C"
    icon: mdi:home-thermometer

  mock_outdoor_temp:
    name: "Outdoor Temperature"
    min: -30
    max: 30
    step: 0.5
    initial: -5
    unit_of_measurement: "°C"
    icon: mdi:thermometer

  mock_room_temp:
    name: "Room Temperature"
    min: 10
    max: 30
    step: 0.1
    initial: 18.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer

  # number.* entities (equitherm.number platform)
  heat_curve_coefficient:
    name: "Heat Curve Coefficient"
    min: 0.5
    max: 5.0
    step: 0.05
    initial: 1.2
    icon: mdi:chart-bell-curve

  heat_curve_exponent:
    name: "Heat Curve Exponent"
    min: 0.5
    max: 3.0
    step: 0.05
    initial: 1.25

  heat_curve_shift:
    name: "Heat Curve Shift"
    min: -20
    max: 20
    step: 0.5
    initial: 0
    unit_of_measurement: "°C"

  # Rate limit number entities
  rate_limit_rising:
    name: "Rate Limit Rising"
    min: 0.0
    max: 2.0
    step: 0.1
    initial: 0.5
    unit_of_measurement: "°C/min"

  rate_limit_falling:
    name: "Rate Limit Falling"
    min: 0.0
    max: 2.0
    step: 0.1
    initial: 1.0
    unit_of_measurement: "°C/min"

  # Mock flow setpoint (rate-limited) — manually adjust to simulate lag behind curve output
  mock_flow_setpoint_input:
    name: "Mock Flow Setpoint (rate-limited)"
    min: 25
    max: 70
    step: 0.1
    initial: 55.0
    unit_of_measurement: "°C"

  # Mock PID-adjusted output — simulates PID correction on top of curve output
  mock_pid_output:
    name: "Mock PID Output"
    min: 25
    max: 70
    step: 0.1
    initial: 60.0
    unit_of_measurement: "°C"

  # PID tuning values
  mock_pid_correction:
    name: "Mock PID Correction"
    min: -10
    max: 10
    step: 0.1
    initial: 0.0
    unit_of_measurement: "°C"

  mock_pid_proportional:
    name: "Mock PID Proportional"
    min: -10
    max: 10
    step: 0.1
    initial: 0.0
    unit_of_measurement: "°C"

  mock_pid_integral:
    name: "Mock PID Integral"
    min: -10
    max: 10
    step: 0.1
    initial: 0.0
    unit_of_measurement: "°C"

  mock_pid_derivative:
    name: "Mock PID Derivative"
    min: -10
    max: 10
    step: 0.1
    initial: 0.0
    unit_of_measurement: "°C"

  mock_fallback_duration:
    name: "Mock Fallback Duration"
    min: 0
    max: 3600
    step: 1
    initial: 0
    unit_of_measurement: "s"

input_boolean:
  mock_heating_active:
    name: "Heating Active"
    initial: true
    icon: mdi:fire

  mock_outdoor_fault:
    name: "Outdoor Sensor Fault"
    initial: false

  mock_indoor_fault:
    name: "Indoor Sensor Fault"
    initial: false

  mock_pid_active:
    name: "PID Active"
    initial: true
    icon: mdi:check-circle

# ─── Climate entity (mirrors climate.equitherm) ───────────────────────────────

climate:
  - platform: generic_thermostat
    name: "Mock Equitherm"
    unique_id: mock_equitherm
    heater: input_boolean.mock_heating_active
    target_sensor: input_number.mock_room_temp
    min_temp: 16
    max_temp: 26
    target_temp: 21
    hot_tolerance: 0.3
    cold_tolerance: 0.3
    precision: 0.1

# ─── Computed sensors (mirrors equitherm sensor platform) ─────────────────────

template:
  - sensor:
      # FLOW_SETPOINT — tracks separate input to simulate rate-limited lag
      # NOTE: No device_class: temperature to avoid HA auto-conversion
      - name: "Mock Flow Setpoint"
        unique_id: mock_flow_setpoint
        unit_of_measurement: "°C"
        state_class: measurement
        icon: mdi:thermometer-water
        state: "{{ states('input_number.mock_flow_setpoint_input') }}"

      # HEATING CURVE OUTPUT — computed from equitherm formula
      # t_flow = t_target + shift + hc × (t_target - t_outdoor)^(1/n)
      - name: "Mock Heating Curve Output"
        unique_id: mock_heating_curve_output
        unit_of_measurement: "°C"
        state_class: measurement
        state: >
          {% set t = state_attr('climate.mock_equitherm', 'temperature') | float(21) %}
          {% set o = states('input_number.mock_outdoor_temp') | float(-5) %}
          {% set hc = states('input_number.heat_curve_coefficient') | float(0.9) %}
          {% set n = states('input_number.heat_curve_exponent') | float(1.25) %}
          {% set s = states('input_number.heat_curve_shift') | float(0) %}
          {% set delta = t - o %}
          {% if delta <= 0 or n <= 0 %}20
          {% else %}
            {% set raw = t + s + hc * (delta ** (1 / n)) %}
            {{ [20, [raw, 70]|min]|max | round(1) }}
          {% endif %}

      - name: "Mock PID Adjusted Output"
        unique_id: mock_pid_adjusted_output
        unit_of_measurement: "°C"
        state_class: measurement
        state: "{{ states('input_number.mock_pid_output') }}"

      - name: "Mock Active Setpoint"
        unique_id: mock_active_setpoint
        unit_of_measurement: "°C"
        state_class: measurement
        state: "{{ states('sensor.mock_flow_setpoint') }}"

      - name: "Mock PID Correction"
        unique_id: mock_pid_correction
        unit_of_measurement: "°C"
        state_class: measurement
        state: "{{ states('input_number.mock_pid_correction') }}"

      - name: "Mock PID Proportional"
        unique_id: mock_pid_proportional
        unit_of_measurement: "°C"
        state_class: measurement
        state: "{{ states('input_number.mock_pid_proportional') }}"

      - name: "Mock PID Integral"
        unique_id: mock_pid_integral
        unit_of_measurement: "°C"
        state_class: measurement
        state: "{{ states('input_number.mock_pid_integral') }}"

      - name: "Mock PID Derivative"
        unique_id: mock_pid_derivative
        unit_of_measurement: "°C"
        state_class: measurement
        state: "{{ states('input_number.mock_pid_derivative') }}"

      - name: "Mock Fallback Duration"
        unique_id: mock_fallback_duration
        unit_of_measurement: "s"
        state_class: measurement
        state: "{{ states('input_number.mock_fallback_duration') }}"

  - binary_sensor:
      - name: "Mock PID Active"
        unique_id: mock_pid_active
        state: "{{ is_state('input_boolean.mock_pid_active', 'on') and not is_state('input_boolean.mock_indoor_fault', 'on') }}"

      - name: "Mock Outdoor Sensor Fault"
        unique_id: mock_outdoor_sensor_fault
        state: "{{ is_state('input_boolean.mock_outdoor_fault', 'on') }}"
        device_class: problem

      - name: "Mock Indoor Sensor Fault"
        unique_id: mock_indoor_sensor_fault
        state: "{{ is_state('input_boolean.mock_indoor_fault', 'on') }}"
        device_class: problem

      # Automatically true when flow_setpoint hasn't caught up to curve output
      - name: "Mock Rate Limiting Active"
        unique_id: mock_rate_limiting_active
        device_class: running
        state: >
          {% set curve = states('sensor.mock_heating_curve_output') | float(0) %}
          {% set flow = states('sensor.mock_flow_setpoint') | float(curve) %}
          {{ (curve - flow) | abs > 0.1 }}
