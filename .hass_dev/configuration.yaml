# Home Assistant dev config for lovelace development

default_config:

lovelace:
  mode: yaml
  resources:
    - url: http://localhost:4000/equitherm-cards.js
      type: module
  dashboards:
    equitherm-dev:
      mode: yaml
      title: Equitherm Dev
      show_in_sidebar: true
      filename: lovelace/dev-dashboard.yaml

homeassistant:
  packages:
    mock_equitherm: !include packages/mock_equitherm.yaml
